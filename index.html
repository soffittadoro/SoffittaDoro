<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soffitta d'Oro - Valuta Oggetti</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #d4af37; /* Colore oro */
            font-size: 24px;
        }
        p {
            color: #666;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin: 20px 0;
        }
        .btn {
            border: 2px solid #d4af37;
            color: white;
            background-color: #d4af37;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        #preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 15px;
            border-radius: 8px;
            display: none;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #fff9db;
            border: 1px solid #ffe066;
            border-radius: 8px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Soffitta d'Oro</h1>
        <p>Fotografa o carica l'immagine del tuo oggetto per stimarne il valore e scoprire dove venderlo.</p>

        <!-- Pulsante per scattare foto o caricare file dalla galleria -->
        <div class="upload-btn-wrapper">
            <button class="btn">📸 Fotografa / Carica Oggetto</button>
            <input type="file" id="fileInput" accept="image/*" capture="environment">
        </div>

        <div>
            <img id="preview" alt="Anteprima oggetto">
        </div>

        <!-- Sezione dei risultati della valutazione -->
        <div id="resultBox" class="result-box">
            <h3 style="margin-top: 0; color: #b78103;">Risultato dell'analisi:</h3>
            <p id="itemDescription"><strong>Oggetto rilevato:</strong> Analisi in corso...</p>
            <p id="itemValue"><strong>Valore stimato:</strong> --</p>
            <p id="itemMarket"><strong>Dove venderlo:</strong> --</p>
        </div>
    </div>

    <div style="margin-top: 30px;">
        <a href="welcome.html" style="color: #888; font-size: 14px; text-decoration: underline;">Torna alla pagina di benvenuto</a>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const resultBox = document.getElementById('resultBox');
        const itemDescription = document.getElementById('itemDescription');
        const itemValue = document.getElementById('itemValue');
        const itemMarket = document.getElementById('itemMarket');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    
                    // Mostra la schermata di caricamento risultati
                    resultBox.style.display = 'block';
                    itemDescription.innerHTML = "<strong>Oggetto rilevato:</strong> Oggetto generico d'antiquariato/collezione";
                    itemValue.innerHTML = "<strong>Valore stimato:</strong> Tra i 30,00€ e i 150,00€ (indicativo)";
                    itemMarket.innerHTML = "<strong>Dove venderlo:</strong> Consigliato su eBay, Vinted o mercatini specializzati.";
                }
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
